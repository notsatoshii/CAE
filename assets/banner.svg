<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="CTRL + ALT + ELITE — retro 3D keyboard keys">
  <defs>
    <!-- Retro synthwave gradients -->
    <linearGradient id="capTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff2ec3"/>
      <stop offset="55%"  stop-color="#a41fff"/>
      <stop offset="100%" stop-color="#4a0caa"/>
    </linearGradient>

    <linearGradient id="capTopLit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00ffe0"/>
      <stop offset="100%" stop-color="#00a7b3"/>
    </linearGradient>

    <linearGradient id="capFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3b0a5a"/>
      <stop offset="100%" stop-color="#190330"/>
    </linearGradient>

    <linearGradient id="capRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5d157d"/>
      <stop offset="100%" stop-color="#2a0645"/>
    </linearGradient>

    <linearGradient id="bgSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0218"/>
      <stop offset="50%"  stop-color="#1b0632"/>
      <stop offset="100%" stop-color="#3c0a58"/>
    </linearGradient>

    <!-- CRT scanlines -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="3" fill="transparent"/>
      <rect width="3" height="1" y="0" fill="rgba(0,0,0,0.25)"/>
    </pattern>

    <!-- Neon glow -->
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="bigneon" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Synthwave sky -->
  <rect width="100%" height="100%" fill="url(#bgSky)"/>

  <!-- Retro sun (semi-arc above horizon) -->
  <g opacity="0.8">
    <circle cx="450" cy="80" r="58" fill="#ff2ec3" filter="url(#bigneon)"/>
    <rect x="390" y="100" width="120" height="3" fill="#0a0218"/>
    <rect x="392" y="108" width="116" height="3" fill="#0a0218"/>
    <rect x="396" y="116" width="108" height="3" fill="#0a0218"/>
    <rect x="400" y="124" width="100" height="3" fill="#0a0218"/>
  </g>

  <!-- Horizon line (neon pink) -->
  <line x1="0" y1="235" x2="900" y2="235" stroke="#ff2ec3" stroke-width="2" filter="url(#neon)"/>

  <!-- Grid floor (perspective lines converging to center) -->
  <g stroke="#ff2ec3" stroke-width="1" opacity="0.55" filter="url(#neon)">
    <!-- vertical converging lines -->
    <line x1="0"   y1="320" x2="380" y2="235"/>
    <line x1="150" y1="320" x2="400" y2="235"/>
    <line x1="300" y1="320" x2="425" y2="235"/>
    <line x1="450" y1="320" x2="450" y2="235"/>
    <line x1="600" y1="320" x2="475" y2="235"/>
    <line x1="750" y1="320" x2="500" y2="235"/>
    <line x1="900" y1="320" x2="520" y2="235"/>
    <!-- horizontal grid lines (closer = further apart) -->
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="0" y1="270" x2="900" y2="270"/>
    <line x1="0" y1="295" x2="900" y2="295"/>
  </g>

  <!-- ═══ KEY 1: CTRL ═══ -->
  <g>
    <!-- right face (depth) -->
    <polygon points="220,90 238,76 238,170 220,184" fill="url(#capRight)" stroke="#ff66cc" stroke-width="1.2">
      <animate attributeName="points" values="220,90 238,76 238,170 220,184 ; 220,100 238,86 238,170 220,184 ; 220,90 238,76 238,170 220,184" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
    </polygon>
    <!-- front face (depth) -->
    <polygon points="60,184 220,184 238,170 78,170" fill="url(#capFront)" stroke="#ff66cc" stroke-width="1.2">
      <animate attributeName="points" values="60,184 220,184 238,170 78,170 ; 60,184 220,184 238,170 78,170 ; 60,184 220,184 238,170 78,170" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
    </polygon>
    <!-- top face -->
    <rect x="60" y="76" width="178" height="94" rx="8" fill="url(#capTop)" stroke="#ff66cc" stroke-width="2" filter="url(#neon)">
      <animate attributeName="y" values="76;90;76" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="url(#capTop);url(#capTopLit);url(#capTop)" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <!-- top highlight edge -->
    <line x1="68" y1="82" x2="230" y2="82" stroke="#ffffff" stroke-width="1.5" opacity="0.4">
      <animate attributeName="y1" values="82;96;82" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="82;96;82" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
    </line>
    <!-- CTRL label with chromatic aberration -->
    <g font-family="'Courier New', 'Monaco', monospace" font-weight="900" font-size="38" text-anchor="middle" filter="url(#neon)">
      <text x="147" y="132" fill="#ff00aa" opacity="0.8">CTRL
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
      </text>
      <text x="149" y="132" fill="#00ffff" opacity="0.8">CTRL
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
      </text>
      <text x="148" y="132" fill="#ffffff">CTRL
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="0s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- ═══ + between CTRL and ALT ═══ -->
  <text x="278" y="150" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="56" fill="#00ffff" filter="url(#bigneon)">+</text>

  <!-- ═══ KEY 2: ALT ═══ -->
  <g>
    <polygon points="470,90 488,76 488,170 470,184" fill="url(#capRight)" stroke="#ff66cc" stroke-width="1.2"/>
    <polygon points="320,184 470,184 488,170 338,170" fill="url(#capFront)" stroke="#ff66cc" stroke-width="1.2"/>
    <rect x="320" y="76" width="168" height="94" rx="8" fill="url(#capTop)" stroke="#ff66cc" stroke-width="2" filter="url(#neon)">
      <animate attributeName="y" values="76;90;76" keyTimes="0;0.07;0.14" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="url(#capTop);url(#capTopLit);url(#capTop)" keyTimes="0;0.07;0.14" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <line x1="328" y1="82" x2="480" y2="82" stroke="#ffffff" stroke-width="1.5" opacity="0.4">
      <animate attributeName="y1" values="82;96;82" keyTimes="0;0.07;0.14" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="82;96;82" keyTimes="0;0.07;0.14" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <g font-family="'Courier New', 'Monaco', monospace" font-weight="900" font-size="38" text-anchor="middle" filter="url(#neon)">
      <text x="402" y="132" fill="#ff00aa" opacity="0.8">ALT
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
      </text>
      <text x="404" y="132" fill="#00ffff" opacity="0.8">ALT
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
      </text>
      <text x="403" y="132" fill="#ffffff">ALT
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- ═══ + between ALT and ELITE ═══ -->
  <text x="528" y="150" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="56" fill="#00ffff" filter="url(#bigneon)">+</text>

  <!-- ═══ KEY 3: ELITE ═══ -->
  <g>
    <polygon points="830,90 848,76 848,170 830,184" fill="url(#capRight)" stroke="#ff66cc" stroke-width="1.2"/>
    <polygon points="570,184 830,184 848,170 588,170" fill="url(#capFront)" stroke="#ff66cc" stroke-width="1.2"/>
    <rect x="570" y="76" width="278" height="94" rx="8" fill="url(#capTop)" stroke="#ff66cc" stroke-width="2" filter="url(#neon)">
      <animate attributeName="y" values="76;90;76" keyTimes="0;0.07;0.14" dur="3.8s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="url(#capTop);url(#capTopLit);url(#capTop)" keyTimes="0;0.07;0.14" dur="3.8s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <line x1="578" y1="82" x2="840" y2="82" stroke="#ffffff" stroke-width="1.5" opacity="0.4">
      <animate attributeName="y1" values="82;96;82" keyTimes="0;0.07;0.14" dur="3.8s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="82;96;82" keyTimes="0;0.07;0.14" dur="3.8s" begin="1s" repeatCount="indefinite"/>
    </line>
    <g font-family="'Courier New', 'Monaco', monospace" font-weight="900" font-size="38" text-anchor="middle" filter="url(#neon)">
      <text x="708" y="132" fill="#ff00aa" opacity="0.8">ELITE
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="1s" repeatCount="indefinite"/>
      </text>
      <text x="710" y="132" fill="#00ffff" opacity="0.8">ELITE
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="1s" repeatCount="indefinite"/>
      </text>
      <text x="709" y="132" fill="#ffffff">ELITE
        <animate attributeName="y" values="132;146;132" keyTimes="0;0.07;0.14" dur="3.8s" begin="1s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Subtitle (retro phosphor green with blinking cursor) -->
  <g transform="translate(450,280)" text-anchor="middle">
    <text font-family="'Courier New', monospace" font-size="15" fill="#00ff88" letter-spacing="4" filter="url(#neon)">
      ▸ MULTI-AGENT AI DEV TEAM ▸ REVIEWER ≠ BUILDER
    </text>
    <text x="242" y="0" font-family="'Courier New', monospace" font-size="15" fill="#00ff88" filter="url(#neon)">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.5;0.5;1" dur="0.9s" repeatCount="indefinite"/>
      _
    </text>
  </g>

  <!-- CRT scanlines over everything (subtle) -->
  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none"/>

  <!-- CRT vignette (darken corners) -->
  <rect width="100%" height="100%" fill="none" stroke="#000" stroke-width="30" opacity="0.5" pointer-events="none"/>
</svg>
