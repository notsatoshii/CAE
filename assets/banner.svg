<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-label="CTRL + ALT + ELITE — a multi-agent AI dev team">
  <defs>
    <!-- Keycap gradient (idle) -->
    <linearGradient id="keyIdle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="50%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0e0e10"/>
    </linearGradient>
    <!-- Keycap gradient (pressed / lit) -->
    <linearGradient id="keyLit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#24ffb0"/>
      <stop offset="100%" stop-color="#00c97c"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="drop" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <!-- Glow when pressed -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="#07080a"/>

  <!-- subtle grid lines -->
  <g stroke="#1a1d22" stroke-width="1">
    <line x1="0" y1="60" x2="880" y2="60"/>
    <line x1="0" y1="180" x2="880" y2="180"/>
  </g>

  <!-- ─── CTRL key ─── -->
  <g transform="translate(60,60)" filter="url(#drop)">
    <!-- idle cap -->
    <rect width="180" height="120" rx="14" fill="url(#keyIdle)" stroke="#3a3a40" stroke-width="2">
      <animate attributeName="y" values="0;6;0" keyTimes="0;0.08;0.16" dur="3.6s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <!-- lit overlay -->
    <rect width="180" height="120" rx="14" fill="url(#keyLit)" opacity="0">
      <animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;0.16" dur="3.6s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="90" y="78" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-weight="800" font-size="44" fill="#e8e8ec" filter="url(#glow)">
      CTRL
      <animate attributeName="fill" values="#e8e8ec;#07080a;#e8e8ec" keyTimes="0;0.08;0.16" dur="3.6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="78;84;78" keyTimes="0;0.08;0.16" dur="3.6s" begin="0s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- plus between CTRL and ALT -->
  <text x="270" y="135" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-weight="800" font-size="48" fill="#4a4a52">+</text>

  <!-- ─── ALT key ─── -->
  <g transform="translate(300,60)" filter="url(#drop)">
    <rect width="160" height="120" rx="14" fill="url(#keyIdle)" stroke="#3a3a40" stroke-width="2">
      <animate attributeName="y" values="0;6;0" keyTimes="0;0.08;0.16" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect width="160" height="120" rx="14" fill="url(#keyLit)" opacity="0">
      <animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;0.16" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <text x="80" y="78" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-weight="800" font-size="44" fill="#e8e8ec" filter="url(#glow)">
      ALT
      <animate attributeName="fill" values="#e8e8ec;#07080a;#e8e8ec" keyTimes="0;0.08;0.16" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="78;84;78" keyTimes="0;0.08;0.16" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- plus between ALT and ELITE -->
  <text x="490" y="135" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-weight="800" font-size="48" fill="#4a4a52">+</text>

  <!-- ─── ELITE key (the payoff — larger, crisper) ─── -->
  <g transform="translate(520,60)" filter="url(#drop)">
    <rect width="280" height="120" rx="14" fill="url(#keyIdle)" stroke="#3a3a40" stroke-width="2">
      <animate attributeName="y" values="0;6;0" keyTimes="0;0.08;0.16" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect width="280" height="120" rx="14" fill="url(#keyLit)" opacity="0">
      <animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;0.16" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <text x="140" y="78" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-weight="800" font-size="44" fill="#e8e8ec" filter="url(#glow)">
      ELITE
      <animate attributeName="fill" values="#e8e8ec;#07080a;#e8e8ec" keyTimes="0;0.08;0.16" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="78;84;78" keyTimes="0;0.08;0.16" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- subtitle - typing effect via cursor -->
  <g transform="translate(440,220)" text-anchor="middle">
    <text font-family="Menlo, Consolas, monospace" font-size="16" fill="#7a7a82" letter-spacing="2">
      multi-agent AI dev team · reviewer ≠ builder · no rubber-stamps
    </text>
    <text x="260" y="0" font-family="Menlo, Consolas, monospace" font-size="16" fill="#24ffb0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
      _
    </text>
  </g>
</svg>
