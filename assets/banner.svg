<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" role="img" aria-label="CTRL + ALT + ELITE — retro keyboard keys">
  <defs>
    <!-- Top face: cream with subtle dish gradient -->
    <linearGradient id="capTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f8edcb"/>
      <stop offset="55%"  stop-color="#ecdfae"/>
      <stop offset="100%" stop-color="#d0bf87"/>
    </linearGradient>

    <!-- Front face: darker beige (the visible "thickness" below the top face, in shadow from overhang) -->
    <linearGradient id="capFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ae9b6c"/>
      <stop offset="100%" stop-color="#887550"/>
    </linearGradient>

    <!-- Whole-banner beige -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#dccda2"/>
      <stop offset="100%" stop-color="#b09e74"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Bezel -->
  <rect x="4" y="4" width="952" height="292" rx="10" fill="none" stroke="#8a7952" stroke-width="2" opacity="0.55"/>
  <rect x="6" y="6" width="948" height="2" fill="#f6eacb" opacity="0.6"/>
  <rect x="6" y="292" width="948" height="2" fill="#4a3e22" opacity="0.4"/>

  <!-- Scuffs -->
  <g stroke="#f0e1b4" stroke-width="0.6" opacity="0.2" stroke-linecap="round">
    <line x1="70"  y1="82"  x2="180" y2="60"/>
    <line x1="640" y1="265" x2="780" y2="242"/>
    <line x1="320" y1="72"  x2="420" y2="56"/>
  </g>

  <!-- Nameplate -->
  <text x="46" y="279" font-family="'Courier New','Menlo',monospace" font-size="9" fill="#5d4f2e" letter-spacing="1.8" opacity="0.85">MODEL  CAE-84  ·  C·A·E  MICROSYSTEMS</text>

  <!-- PWR LED -->
  <circle cx="898" cy="66" r="3.5" fill="#ff9830"/>
  <text x="885" y="70" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#5d4f2e" letter-spacing="1.5">PWR</text>

  <!-- Divider -->
  <line x1="30" y1="88" x2="930" y2="88" stroke="#8a7952" stroke-width="0.5" opacity="0.5"/>

  <!--
    Real-keycap silhouette:
      TOP FACE  = trapezoid (narrower at top, widens toward base) — real keycap shape
      FRONT FACE = rectangle below top face (the visible skirt/side in shadow)
      GROUND SHADOW = soft ellipse beneath

    Top face: narrow=152 wide at y=100, wide=174 at y=190 (bottom)
    Front face: 174 wide at y=190 to y=208 (18px tall)
  -->

  <!-- ═══ CTRL ═══ -->
  <!-- Ground shadow -->
  <ellipse cx="165" cy="222" rx="95" ry="5" fill="#4a3e22" opacity="0.4"/>
  <!-- Front face (skirt below the top face — in shadow) -->
  <path d="M 78 190 L 252 190 L 258 210 L 72 210 Z" fill="url(#capFront)" stroke="#6d5d38" stroke-width="1"/>
  <!-- Top face (trapezoid — narrower at top, widens to meet front face) -->
  <path d="M 89 100 Q 85 100 85 104 L 85 186 Q 85 190 89 190 L 241 190 Q 245 190 245 186 L 245 104 Q 245 100 241 100 Z" fill="url(#capTop)" stroke="#7a6a42" stroke-width="1.2"/>
  <!-- Top-edge specular highlight -->
  <line x1="92" y1="106" x2="238" y2="106" stroke="#fff8dc" stroke-width="1.4" opacity="0.8"/>
  <!-- Side highlights (light catching keycap sides near top) -->
  <line x1="88" y1="110" x2="88" y2="180" stroke="#fff8dc" stroke-width="0.6" opacity="0.4"/>
  <!-- Label -->
  <text x="165" y="155" text-anchor="middle" font-family="'Courier New','Menlo','Consolas',monospace" font-weight="700" font-size="30" fill="#2a1f0c" letter-spacing="4">CTRL</text>

  <text x="285" y="155" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="28" fill="#7a683d">+</text>

  <!-- ═══ ALT ═══ -->
  <ellipse cx="382" cy="222" rx="90" ry="5" fill="#4a3e22" opacity="0.4"/>
  <path d="M 298 190 L 462 190 L 468 210 L 292 210 Z" fill="url(#capFront)" stroke="#6d5d38" stroke-width="1"/>
  <path d="M 309 100 Q 305 100 305 104 L 305 186 Q 305 190 309 190 L 451 190 Q 455 190 455 186 L 455 104 Q 455 100 451 100 Z" fill="url(#capTop)" stroke="#7a6a42" stroke-width="1.2"/>
  <line x1="312" y1="106" x2="448" y2="106" stroke="#fff8dc" stroke-width="1.4" opacity="0.8"/>
  <line x1="308" y1="110" x2="308" y2="180" stroke="#fff8dc" stroke-width="0.6" opacity="0.4"/>
  <text x="380" y="155" text-anchor="middle" font-family="'Courier New','Menlo','Consolas',monospace" font-weight="700" font-size="30" fill="#2a1f0c" letter-spacing="4">ALT</text>

  <text x="491" y="155" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="28" fill="#7a683d">+</text>

  <!-- ═══ ELITE ═══ -->
  <ellipse cx="697" cy="222" rx="195" ry="5" fill="#4a3e22" opacity="0.4"/>
  <path d="M 508 190 L 882 190 L 888 210 L 502 210 Z" fill="url(#capFront)" stroke="#6d5d38" stroke-width="1"/>
  <path d="M 519 100 Q 515 100 515 104 L 515 186 Q 515 190 519 190 L 871 190 Q 875 190 875 186 L 875 104 Q 875 100 871 100 Z" fill="url(#capTop)" stroke="#7a6a42" stroke-width="1.2"/>
  <line x1="522" y1="106" x2="868" y2="106" stroke="#fff8dc" stroke-width="1.4" opacity="0.8"/>
  <line x1="518" y1="110" x2="518" y2="180" stroke="#fff8dc" stroke-width="0.6" opacity="0.4"/>
  <text x="695" y="155" text-anchor="middle" font-family="'Courier New','Menlo','Consolas',monospace" font-weight="700" font-size="30" fill="#2a1f0c" letter-spacing="6">ELITE</text>
</svg>
