<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" role="img" aria-label="CTRL + ALT + ELITE — keyboard shortcut">
  <defs>
    <!-- Realistic keycap top face — dark charcoal with subtle concave dish via radial gradient -->
    <radialGradient id="capTop" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#2a2a30"/>
      <stop offset="70%"  stop-color="#353541"/>
      <stop offset="100%" stop-color="#3c3c48"/>
    </radialGradient>

    <!-- Pressed state: subtle cyan backlight bleeds through (mechanical keyboard RGB vibe) -->
    <radialGradient id="capTopLit" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#4aa8ff" stop-opacity="0.3"/>
      <stop offset="60%"  stop-color="#2a2a30"/>
      <stop offset="100%" stop-color="#3c3c48"/>
    </radialGradient>

    <!-- Front face — the visible depth strip below top -->
    <linearGradient id="capFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e1e23"/>
      <stop offset="100%" stop-color="#101014"/>
    </linearGradient>

    <!-- Right side face — slightly darker than front -->
    <linearGradient id="capSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#16161a"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>

    <!-- Keyboard base plate -->
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#18181d"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </linearGradient>

    <!-- Backlight glow (under keycap when pressed) -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4aa8ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4aa8ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow under keycap -->
    <filter id="keyShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.65"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background (near-black with subtle vertical gradient — "desk in dim room") -->
  <rect width="100%" height="100%" fill="#050508"/>

  <!-- Keyboard base plate -->
  <rect x="40" y="200" width="880" height="70" rx="8" fill="url(#boardGrad)" stroke="#1a1a1f" stroke-width="1"/>
  <!-- Key wells (slight recesses where each key sits) -->
  <g opacity="0.6">
    <rect x="80"  y="208" width="180" height="54" rx="6" fill="#060608"/>
    <rect x="300" y="208" width="170" height="54" rx="6" fill="#060608"/>
    <rect x="510" y="208" width="370" height="54" rx="6" fill="#060608"/>
  </g>

  <!-- ═══════════════════════ KEY 1: CTRL ═══════════════════════ -->
  <g>
    <!-- Soft shadow under the key (intensifies when key up, softens when pressed) -->
    <ellipse cx="170" cy="218" rx="90" ry="6" fill="#000" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.15;0.55" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="6;3;6" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Backlight glow (only visible when pressed) -->
    <rect x="80" y="80" width="180" height="110" rx="10" fill="url(#glow)" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="80;92;80" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
    </rect>

    <!-- Front face (vertical depth strip visible below the top face) -->
    <path d="M 80 170 L 260 170 L 260 190 L 80 190 Z" fill="url(#capFront)">
      <animate attributeName="d" values="M 80 170 L 260 170 L 260 190 L 80 190 Z ; M 80 182 L 260 182 L 260 190 L 80 190 Z ; M 80 170 L 260 170 L 260 190 L 80 190 Z" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
    </path>

    <!-- Right side face (small trapezoid showing depth on the right) -->
    <path d="M 260 85 L 272 78 L 272 180 L 260 190 Z" fill="url(#capSide)">
      <animate attributeName="d" values="M 260 85 L 272 78 L 272 180 L 260 190 Z ; M 260 97 L 272 90 L 272 180 L 260 190 Z ; M 260 85 L 272 78 L 272 180 L 260 190 Z" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
    </path>

    <!-- Top face (concave charcoal dish) -->
    <rect x="80" y="80" width="180" height="92" rx="10" fill="url(#capTop)" stroke="#1f1f25" stroke-width="1.2" filter="url(#keyShadow)">
      <animate attributeName="y" values="80;92;80" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="url(#capTop);url(#capTopLit);url(#capTop)" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
    </rect>

    <!-- Top-edge highlight (light catching the upper bevel) -->
    <line x1="88" y1="86" x2="252" y2="86" stroke="#5c5c6a" stroke-width="1.3" opacity="0.7">
      <animate attributeName="y1" values="86;98;86" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="86;98;86" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
    </line>

    <!-- Inner dish shadow (subtle darker ring inside the top face suggesting concavity) -->
    <ellipse cx="170" cy="130" rx="72" ry="28" fill="none" stroke="#1c1c22" stroke-width="1" opacity="0.55">
      <animate attributeName="cy" values="130;142;130" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Label (clean white, slight letter-spacing, keyboard font) -->
    <text x="170" y="138" text-anchor="middle" font-family="'SF Mono','Menlo','Consolas',monospace" font-weight="700" font-size="28" fill="#e5e5ea" letter-spacing="4">
      CTRL
      <animate attributeName="y" values="138;150;138" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#e5e5ea;#c8e4ff;#e5e5ea" keyTimes="0;0.08;0.16" dur="4s" begin="0s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- "+" separator CTRL/ALT -->
  <text x="288" y="140" text-anchor="middle" font-family="'SF Mono','Menlo',monospace" font-weight="400" font-size="26" fill="#3a3a42">+</text>

  <!-- ═══════════════════════ KEY 2: ALT ═══════════════════════ -->
  <g>
    <ellipse cx="385" cy="218" rx="85" ry="6" fill="#000" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.15;0.55" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="6;3;6" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </ellipse>

    <rect x="300" y="80" width="170" height="110" rx="10" fill="url(#glow)" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="80;92;80" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </rect>

    <path d="M 300 170 L 470 170 L 470 190 L 300 190 Z" fill="url(#capFront)">
      <animate attributeName="d" values="M 300 170 L 470 170 L 470 190 L 300 190 Z ; M 300 182 L 470 182 L 470 190 L 300 190 Z ; M 300 170 L 470 170 L 470 190 L 300 190 Z" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </path>

    <path d="M 470 85 L 482 78 L 482 180 L 470 190 Z" fill="url(#capSide)">
      <animate attributeName="d" values="M 470 85 L 482 78 L 482 180 L 470 190 Z ; M 470 97 L 482 90 L 482 180 L 470 190 Z ; M 470 85 L 482 78 L 482 180 L 470 190 Z" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </path>

    <rect x="300" y="80" width="170" height="92" rx="10" fill="url(#capTop)" stroke="#1f1f25" stroke-width="1.2" filter="url(#keyShadow)">
      <animate attributeName="y" values="80;92;80" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="url(#capTop);url(#capTopLit);url(#capTop)" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </rect>

    <line x1="308" y1="86" x2="462" y2="86" stroke="#5c5c6a" stroke-width="1.3" opacity="0.7">
      <animate attributeName="y1" values="86;98;86" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="86;98;86" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </line>

    <ellipse cx="385" cy="130" rx="68" ry="28" fill="none" stroke="#1c1c22" stroke-width="1" opacity="0.55">
      <animate attributeName="cy" values="130;142;130" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </ellipse>

    <text x="385" y="138" text-anchor="middle" font-family="'SF Mono','Menlo','Consolas',monospace" font-weight="700" font-size="28" fill="#e5e5ea" letter-spacing="4">
      ALT
      <animate attributeName="y" values="138;150;138" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#e5e5ea;#c8e4ff;#e5e5ea" keyTimes="0;0.08;0.16" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- "+" separator ALT/ELITE -->
  <text x="498" y="140" text-anchor="middle" font-family="'SF Mono','Menlo',monospace" font-weight="400" font-size="26" fill="#3a3a42">+</text>

  <!-- ═══════════════════════ KEY 3: ELITE ═══════════════════════ -->
  <g>
    <ellipse cx="695" cy="218" rx="190" ry="6" fill="#000" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.15;0.55" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="6;3;6" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
    </ellipse>

    <rect x="510" y="80" width="370" height="110" rx="10" fill="url(#glow)" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="80;92;80" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
    </rect>

    <path d="M 510 170 L 880 170 L 880 190 L 510 190 Z" fill="url(#capFront)">
      <animate attributeName="d" values="M 510 170 L 880 170 L 880 190 L 510 190 Z ; M 510 182 L 880 182 L 880 190 L 510 190 Z ; M 510 170 L 880 170 L 880 190 L 510 190 Z" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
    </path>

    <path d="M 880 85 L 892 78 L 892 180 L 880 190 Z" fill="url(#capSide)">
      <animate attributeName="d" values="M 880 85 L 892 78 L 892 180 L 880 190 Z ; M 880 97 L 892 90 L 892 180 L 880 190 Z ; M 880 85 L 892 78 L 892 180 L 880 190 Z" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
    </path>

    <rect x="510" y="80" width="370" height="92" rx="10" fill="url(#capTop)" stroke="#1f1f25" stroke-width="1.2" filter="url(#keyShadow)">
      <animate attributeName="y" values="80;92;80" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="url(#capTop);url(#capTopLit);url(#capTop)" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
    </rect>

    <line x1="518" y1="86" x2="872" y2="86" stroke="#5c5c6a" stroke-width="1.3" opacity="0.7">
      <animate attributeName="y1" values="86;98;86" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="86;98;86" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
    </line>

    <ellipse cx="695" cy="130" rx="160" ry="28" fill="none" stroke="#1c1c22" stroke-width="1" opacity="0.55">
      <animate attributeName="cy" values="130;142;130" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
    </ellipse>

    <text x="695" y="138" text-anchor="middle" font-family="'SF Mono','Menlo','Consolas',monospace" font-weight="700" font-size="28" fill="#e5e5ea" letter-spacing="6">
      ELITE
      <animate attributeName="y" values="138;150;138" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#e5e5ea;#c8e4ff;#e5e5ea" keyTimes="0;0.08;0.16" dur="4s" begin="1s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Subtle subtitle below the keyboard -->
  <text x="480" y="290" text-anchor="middle" font-family="'SF Mono','Menlo',monospace" font-size="12" fill="#4a4a52" letter-spacing="5">
    MULTI-AGENT AI DEV TEAM · REVIEWER ≠ BUILDER
  </text>
</svg>
